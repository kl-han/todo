openapi: 3.1.0
info:
  title: Quadrant Todo API
  description: >-
    Normative REST contract for Quadrant Todo. The same contract is served
    by the embedded (loopback) backend and the standalone server; both must
    pass the shared conformance suite. Errors use RFC 9457 Problem Details.
  version: 1.2.0

servers:
  - url: http://127.0.0.1:{port}
    description: Embedded loopback backend (ephemeral port, per-launch token).
    variables:
      port:
        default: "0"
  - url: https://todo.example.net
    description: Standalone remote backend.

tags:
  - name: system
    description: Process readiness and capability discovery.
  - name: tasks
    description: Task CRUD, soft deletion, restore, and tag assignment.
  - name: quadrants
    description: Grouped Eisenhower-matrix read model.
  - name: agenda
    description: Date-grouped schedule read model over task start/due values.
  - name: recurrence
    description: RFC 5545-subset recurrence rules and materialized
      occurrences.
  - name: reminders
    description: Reminder records and platform (re)scheduling state.
  - name: tags
    description: Tag CRUD and progress.

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [system]
      summary: Process readiness.
      description: >-
        The only unauthenticated route; clients poll it during startup and
        resume before using an authenticated client.
      security: []
      responses:
        "200":
          description: The backend is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      tags: [system]
      summary: API version, schema version, and supported features.
      description: >-
        Remote-mode clients call this after connecting to verify the
        server speaks a compatible contract before issuing data requests.
      responses:
        "200":
          description: Capability report.
          content:
            application/json:
              schema:
                type: object
                required: [api_version, schema_version, features]
                properties:
                  api_version: { type: string, enum: [v1] }
                  schema_version: { type: integer }
                  features:
                    type: array
                    items: { type: string }

  /api/v1/vaults:
    get:
      operationId: listVaults
      tags: [system]
      summary: List accessible vaults.
      description: >-
        The embedded backend always returns exactly `default`; a standalone
        server returns every vault under its data directory.
      responses:
        "200":
          description: Accessible vaults.
          content:
            application/json:
              schema:
                type: object
                required: [vaults]
                properties:
                  vaults:
                    type: array
                    items:
                      type: object
                      required: [id]
                      properties:
                        id: { type: string }

  /api/v1/vaults/{vault_id}/tasks:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: listTasks
      tags: [tasks]
      summary: Query tasks.
      parameters:
        - $ref: "#/components/parameters/StatusFilter"
        - name: quadrant
          in: query
          schema: { type: integer, minimum: 1, maximum: 4 }
        - name: tag_id
          in: query
          schema: { type: string, format: uuid }
        - name: sort
          in: query
          schema: { type: string, enum: [matrix_modified_asc] }
      responses:
        "200":
          description: Matching non-deleted tasks in the requested order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Created; ETag carries the initial version.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400": { $ref: "#/components/responses/ValidationProblem" }

  /api/v1/vaults/{vault_id}/tasks/{task_id}:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TaskId"
    get:
      operationId: getTask
      tags: [tasks]
      summary: Read one task.
      responses:
        "200":
          description: The task.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Edit title, notes, status, or classification.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskPatch" }
      responses:
        "200":
          description: Updated task with its new version.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Soft-delete a task.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204":
          description: Deleted; restorable via the restore action.
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }

  /api/v1/vaults/{vault_id}/tasks/{task_id}/restore:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TaskId"
    post:
      operationId: restoreTask
      tags: [tasks]
      summary: Restore a recently deleted task.
      description: Idempotent; restoring a live task returns it unchanged.
      responses:
        "200":
          description: The restored task.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }

  /api/v1/vaults/{vault_id}/tasks/{task_id}/tags/{tag_id}:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TaskId"
      - $ref: "#/components/parameters/TagId"
    put:
      operationId: assignTag
      tags: [tasks]
      summary: Assign a tag to a task.
      description: Idempotent; bumps the task version when it changes state.
      responses:
        "200":
          description: The task with its updated tag set.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    delete:
      operationId: removeTag
      tags: [tasks]
      summary: Remove a tag from a task.
      responses:
        "200":
          description: The task with its updated tag set.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }

  /api/v1/vaults/{vault_id}/tasks/{task_id}/recurrence:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TaskId"
    put:
      operationId: setRecurrence
      tags: [recurrence]
      summary: Attach or replace the task's recurrence rule.
      description: >-
        The task must have a scheduled anchor side (due, or start when no
        due exists); occurrences repeat that side's shape. Replacing a
        rule deletes open occurrences of the old rule and materializes
        the new one; settled (completed/skipped) occurrences are history
        and survive.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurrenceCreate" }
      responses:
        "200":
          description: The active rule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Recurrence" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    get:
      operationId: getRecurrence
      tags: [recurrence]
      summary: Read the task's recurrence rule.
      responses:
        "200":
          description: The active rule.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Recurrence" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    delete:
      operationId: clearRecurrence
      tags: [recurrence]
      summary: Detach the task's recurrence rule.
      description: >-
        Deletes open occurrences; settled occurrences remain as history.
        Idempotent.
      responses:
        "204":
          description: The task no longer recurs.
        "404": { $ref: "#/components/responses/NotFoundProblem" }

  /api/v1/vaults/{vault_id}/occurrences:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: listOccurrences
      tags: [recurrence]
      summary: Materialized occurrences in a date range.
      description: >-
        Materializes (idempotently) and returns occurrences whose
        original date falls in `[from, to]`. Both backends return
        identical occurrences for identical rules.
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
        - name: status
          in: query
          schema:
            type: string
            enum: [open, completed, skipped, all]
            default: all
        - name: task_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Occurrences ascending by original date, then id.
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items: { $ref: "#/components/schemas/Occurrence" }
        "400": { $ref: "#/components/responses/ValidationProblem" }

  /api/v1/vaults/{vault_id}/occurrences/{occurrence_id}:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - name: occurrence_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getOccurrence
      tags: [recurrence]
      summary: Read one occurrence.
      responses:
        "200":
          description: The occurrence.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Occurrence" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    patch:
      operationId: updateOccurrence
      tags: [recurrence]
      summary: Complete, skip, reopen, or reschedule one occurrence.
      description: >-
        Completing one occurrence never touches its siblings or the task.
        Skipping and rescheduling record a recurrence exception keyed by
        the original date. Rescheduling accepts the field matching the
        occurrence's kind (`occurrence_date` or `occurrence_at_utc`).
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, completed, skipped]
                occurrence_date: { type: string, format: date }
                occurrence_at_utc: { type: string, format: date-time }
      responses:
        "200":
          description: The updated occurrence.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Occurrence" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }

  /api/v1/vaults/{vault_id}/reminders:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: listReminders
      tags: [reminders]
      summary: Query reminders, optionally by state and trigger horizon.
      description: >-
        `until` filters on the reminder's *effective* trigger instant,
        which is recomputed from the current task/occurrence schedule on
        every read — this is what reboot/timezone-change recovery
        queries.
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [pending, scheduled, delivered, dismissed, all]
            default: all
        - name: until
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Reminders ascending by effective trigger, then id.
          content:
            application/json:
              schema:
                type: object
                required: [reminders]
                properties:
                  reminders:
                    type: array
                    items: { $ref: "#/components/schemas/Reminder" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
    post:
      operationId: createReminder
      tags: [reminders]
      summary: Create a reminder for a task or an occurrence.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReminderCreate" }
      responses:
        "201":
          description: Created reminder.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reminder" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }

  /api/v1/vaults/{vault_id}/reminders/{reminder_id}:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - name: reminder_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getReminder
      tags: [reminders]
      summary: Read one reminder.
      responses:
        "200":
          description: The reminder.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reminder" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    patch:
      operationId: updateReminder
      tags: [reminders]
      summary: Advance delivery state or record the platform schedule id.
      description: >-
        Platform adapters PATCH `state=scheduled` with their
        `platform_schedule_id` after registering an OS notification, and
        `state=delivered`/`dismissed` afterwards. Setting `state=pending`
        clears the platform id (used when a stale schedule is discarded
        during recovery).
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  type: string
                  enum: [pending, scheduled, delivered, dismissed]
                platform_schedule_id: { type: [string, "null"] }
      responses:
        "200":
          description: The updated reminder.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reminder" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }
    delete:
      operationId: deleteReminder
      tags: [reminders]
      summary: Delete a reminder.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204":
          description: Deleted.
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }

  /api/v1/vaults/{vault_id}/agenda:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: getAgenda
      tags: [agenda]
      summary: Tasks grouped by task-local calendar date.
      description: >-
        Read model over task start/due values. Each scheduled side of a
        task contributes one entry on its task-local date: the stored date
        for date-only values, or the date of the stored instant rendered
        in the task's `timezone_id` for date-time values. Days outside
        `[from, to]` are omitted, as are days without entries.
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
          description: First task-local date included (inclusive).
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
          description: >-
            Last task-local date included (inclusive). Must be on or after
            `from`; the range must not exceed 366 days.
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: Days in ascending date order.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgendaReport" }
        "400": { $ref: "#/components/responses/ValidationProblem" }

  /api/v1/vaults/{vault_id}/quadrants:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: getQuadrants
      tags: [quadrants]
      summary: All four grouped task collections and counts.
      parameters:
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: >-
            Exactly four groups in quadrant order. Quadrant membership is
            derived: Q1 urgent+important, Q2 important, Q3 urgent, Q4
            neither.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuadrantReport" }

  /api/v1/vaults/{vault_id}/tags:
    parameters:
      - $ref: "#/components/parameters/VaultId"
    get:
      operationId: listTags
      tags: [tags]
      summary: Tags with completed/total progress.
      responses:
        "200":
          description: Active tags, name-ordered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TagList" }
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TagCreate" }
      responses:
        "201":
          description: Created tag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "409": { $ref: "#/components/responses/ConflictProblem" }

  /api/v1/vaults/{vault_id}/tags/{tag_id}:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TagId"
    get:
      operationId: getTag
      tags: [tags]
      summary: Read one tag.
      responses:
        "200":
          description: The tag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
    patch:
      operationId: updateTag
      tags: [tags]
      summary: Rename or recolor a tag.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TagPatch" }
      responses:
        "200":
          description: Updated tag.
          headers:
            ETag: { $ref: "#/components/headers/ETag" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tag" }
        "400": { $ref: "#/components/responses/ValidationProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "409": { $ref: "#/components/responses/ConflictProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Soft-delete a tag.
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204":
          description: Deleted. Tasks keep existing; the tag disappears
            from their tag sets.
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "412": { $ref: "#/components/responses/VersionConflictProblem" }

  /api/v1/vaults/{vault_id}/tags/{tag_id}/tasks:
    parameters:
      - $ref: "#/components/parameters/VaultId"
      - $ref: "#/components/parameters/TagId"
    get:
      operationId: listTagTasks
      tags: [tags]
      summary: Sorted, filtered task list for a tag.
      parameters:
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: The tag's tasks in matrix order.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskList" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }

components:
  securitySchemes:
    localToken:
      type: http
      scheme: local
      description: >-
        Embedded backend authentication: `Authorization: Local <token>`
        where the token is a random per-launch 256-bit value that is never
        persisted.
    bearerToken:
      type: http
      scheme: bearer
      description: Standalone backend authentication with a persistent token.

  parameters:
    VaultId:
      name: vault_id
      in: path
      required: true
      schema: { type: string }
      description: Vault name; the embedded backend serves only `default`.
    TaskId:
      name: task_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TagId:
      name: tag_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
        enum: [open, completed, all]
        default: open
      description: >-
        Soft-deleted entities are never included, whatever the filter.
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema: { type: string, example: '"7"' }
      description: >-
        Strong ETag of the version the client last saw. When present and
        stale, the request fails with 412; when absent, the write is
        unconditional.

  headers:
    ETag:
      schema: { type: string, example: '"7"' }
      description: The resource version in ETag form.

  responses:
    ValidationProblem:
      description: The request is malformed or violates a validation rule.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFoundProblem:
      description: Vault, task, or tag does not exist (or is deleted).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ConflictProblem:
      description: The request contradicts current state (e.g. duplicate
        active tag name).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    VersionConflictProblem:
      description: The resource changed; `current_version` carries the
        live version.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Health:
      type: object
      required: [status, api_version, schema_version, backend]
      properties:
        status: { type: string, enum: [ok] }
        api_version: { type: string, enum: [v1] }
        schema_version: { type: integer }
        backend: { type: string, enum: [embedded, standalone] }

    Task:
      type: object
      required:
        [id, title, notes, is_urgent, is_important, status, quadrant,
         start_kind, start_date, start_at_utc, due_kind, due_date,
         due_at_utc, timezone_id, estimated_minutes, recurrence_rule_id,
         completed_at, created_at, updated_at, deleted_at, version, tag_ids]
      properties:
        id: { type: string, format: uuid }
        title: { type: string, maxLength: 500 }
        notes: { type: string, maxLength: 10000 }
        is_urgent: { type: boolean }
        is_important: { type: boolean }
        status: { type: string, enum: [open, completed] }
        quadrant:
          type: integer
          minimum: 1
          maximum: 4
          description: >-
            Derived from is_urgent/is_important; never stored. Schedule
            values never change the quadrant.
        start_kind: { $ref: "#/components/schemas/ScheduleKind" }
        start_date:
          type: [string, "null"]
          format: date
          description: Task-local calendar date; set iff start_kind=date.
        start_at_utc:
          type: [string, "null"]
          format: date-time
          description: UTC instant; set iff start_kind=datetime.
        due_kind: { $ref: "#/components/schemas/ScheduleKind" }
        due_date:
          type: [string, "null"]
          format: date
          description: Task-local calendar date; set iff due_kind=date.
        due_at_utc:
          type: [string, "null"]
          format: date-time
          description: UTC instant; set iff due_kind=datetime.
        timezone_id:
          type: [string, "null"]
          description: >-
            IANA timezone of the task's date-time values. Set iff at
            least one of start_kind/due_kind is datetime.
        estimated_minutes:
          type: [integer, "null"]
          minimum: 1
          maximum: 10080
        recurrence_rule_id:
          type: [string, "null"]
          format: uuid
          description: >-
            Read-only; managed through the task's recurrence resource.
        completed_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: [string, "null"], format: date-time }
        version: { type: integer, minimum: 1 }
        tag_ids:
          type: array
          items: { type: string, format: uuid }
          description: Active (non-deleted) tags only, name-ordered.

    ScheduleKind:
      type: string
      enum: [none, date, datetime]
      description: >-
        How one side (start or due) of a task's schedule is expressed. A
        date-only value is never converted to or from an instant — storing
        a date-only deadline as midnight UTC could move it to the
        preceding local date.

    TaskCreate:
      type: object
      required: [title]
      description: >-
        Schedule validation: each side must carry exactly the value its
        kind requires (`date` needs the date field, `datetime` needs the
        UTC instant, `none` needs neither); `timezone_id` is required
        when any side is datetime and must be absent otherwise. Instants
        must carry an explicit UTC designator or offset.
      properties:
        title: { type: string }
        notes: { type: string }
        is_urgent: { type: boolean, default: false }
        is_important: { type: boolean, default: false }
        start_kind: { $ref: "#/components/schemas/ScheduleKind" }
        start_date: { type: string, format: date }
        start_at_utc: { type: string, format: date-time }
        due_kind: { $ref: "#/components/schemas/ScheduleKind" }
        due_date: { type: string, format: date }
        due_at_utc: { type: string, format: date-time }
        timezone_id: { type: string }
        estimated_minutes: { type: integer, minimum: 1, maximum: 10080 }

    TaskPatch:
      type: object
      description: >-
        Schedule fields patch by side: providing a side's kind resets
        that side to exactly the values provided with it; providing a
        value without its kind updates the value under the existing kind.
        The merged result must satisfy the TaskCreate schedule rules; a
        patch that clears the last datetime side sheds an inherited
        `timezone_id` automatically. `estimated_minutes` may be set to
        JSON null to clear it.
      properties:
        title: { type: string }
        notes: { type: string }
        is_urgent: { type: boolean }
        is_important: { type: boolean }
        status: { type: string, enum: [open, completed] }
        start_kind: { $ref: "#/components/schemas/ScheduleKind" }
        start_date: { type: string, format: date }
        start_at_utc: { type: string, format: date-time }
        due_kind: { $ref: "#/components/schemas/ScheduleKind" }
        due_date: { type: string, format: date }
        due_at_utc: { type: string, format: date-time }
        timezone_id: { type: string }
        estimated_minutes:
          type: [integer, "null"]
          minimum: 1
          maximum: 10080

    TaskList:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }
          description: >-
            Sorted by `is_urgent DESC, is_important DESC, updated_at ASC,
            id ASC`.

    Recurrence:
      type: object
      required: [id, task_id, dtstart, rrule, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        dtstart:
          type: string
          format: date
          description: First candidate occurrence date (task-local).
        rrule:
          type: string
          description: >-
            RFC 5545 RRULE (supported subset: FREQ=DAILY|WEEKLY|MONTHLY,
            INTERVAL, BYDAY with optional ordinal for monthly, BYMONTHDAY,
            COUNT, UNTIL as a date). Examples:
            `FREQ=WEEKLY;BYDAY=MO,WE,FR`, `FREQ=MONTHLY;BYMONTHDAY=31`,
            `FREQ=MONTHLY;BYDAY=-1FR;COUNT=6`.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RecurrenceCreate:
      type: object
      required: [dtstart, rrule]
      properties:
        dtstart: { type: string, format: date }
        rrule: { type: string }

    Occurrence:
      type: object
      required:
        [id, task_id, recurrence_rule_id, original_date, kind,
         occurrence_date, occurrence_at_utc, status, completed_at,
         created_at, updated_at, version]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        recurrence_rule_id: { type: string, format: uuid }
        original_date:
          type: string
          format: date
          description: >-
            The generated date — the occurrence's permanent identity,
            unchanged by rescheduling.
        kind:
          type: string
          enum: [start, due]
          description: Which schedule side of the task this occurrence
            repeats (the anchor side).
        occurrence_date:
          type: [string, "null"]
          format: date
          description: Set when the anchor side is date-only.
        occurrence_at_utc:
          type: [string, "null"]
          format: date-time
          description: >-
            Set when the anchor side is a date-time: the task's local
            wall time on the occurrence date in the task's timezone,
            converted per occurrence (DST-correct).
        status: { type: string, enum: [open, completed, skipped] }
        completed_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }

    Reminder:
      type: object
      required:
        [id, task_id, occurrence_id, trigger_type, trigger_at_utc,
         offset_minutes, effective_trigger_at_utc, channel, state,
         platform_schedule_id, created_at, updated_at, version]
      properties:
        id: { type: string, format: uuid }
        task_id: { type: [string, "null"], format: uuid }
        occurrence_id: { type: [string, "null"], format: uuid }
        trigger_type:
          type: string
          enum: [absolute, relative_start, relative_due]
        trigger_at_utc:
          type: [string, "null"]
          format: date-time
          description: Set iff trigger_type=absolute.
        offset_minutes:
          type: [integer, "null"]
          minimum: 0
          description: >-
            Minutes before the referenced side; set iff trigger_type is
            relative. Relative reminders require a datetime side.
        effective_trigger_at_utc:
          type: [string, "null"]
          format: date-time
          description: >-
            Recomputed from the current task/occurrence schedule on
            every read; null when the referenced side no longer exists.
        channel: { type: string, enum: [notification] }
        state:
          type: string
          enum: [pending, scheduled, delivered, dismissed]
        platform_schedule_id: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }

    ReminderCreate:
      type: object
      required: [trigger_type]
      description: >-
        Exactly one of `task_id`/`occurrence_id` must be set. Absolute
        reminders carry `trigger_at_utc`; relative reminders carry
        `offset_minutes` and require the referenced side to be a
        date-time (date-only sides need an absolute reminder).
      properties:
        task_id: { type: string, format: uuid }
        occurrence_id: { type: string, format: uuid }
        trigger_type:
          type: string
          enum: [absolute, relative_start, relative_due]
        trigger_at_utc: { type: string, format: date-time }
        offset_minutes: { type: integer, minimum: 0 }
        channel: { type: string, enum: [notification], default: notification }

    AgendaReport:
      type: object
      required: [from, to, status, days]
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        status: { type: string, enum: [open, completed, all] }
        days:
          type: array
          description: Ascending by date; only days with entries appear.
          items:
            type: object
            required: [date, entries]
            properties:
              date: { type: string, format: date }
              entries:
                type: array
                description: >-
                  All-day entries (null time_local) first, then timed
                  entries by ascending time_local, then task id.
                items:
                  type: object
                  required: [kind, time_local, task]
                  properties:
                    kind:
                      type: string
                      enum: [start, due]
                      description: Which side of the task's schedule
                        produced this entry.
                    time_local:
                      type: [string, "null"]
                      description: >-
                        `HH:MM` wall-clock time in the task's
                        `timezone_id`; null for date-only values.
                    task: { $ref: "#/components/schemas/Task" }

    QuadrantReport:
      type: object
      required: [status, quadrants]
      properties:
        status: { type: string, enum: [open, completed, all] }
        quadrants:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: object
            required: [quadrant, count, tasks]
            properties:
              quadrant: { type: integer, minimum: 1, maximum: 4 }
              count: { type: integer }
              tasks:
                type: array
                items: { $ref: "#/components/schemas/Task" }

    Tag:
      type: object
      required: [id, name, color, created_at, updated_at, version, progress]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, maxLength: 100 }
        color: { type: string, pattern: "^#[0-9a-f]{6}$" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
        progress:
          type: object
          required: [completed, total]
          properties:
            completed: { type: integer }
            total: { type: integer }
          description: Progress across non-deleted tasks carrying the tag.

    TagCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: string, default: "#808080" }

    TagPatch:
      type: object
      properties:
        name: { type: string }
        color: { type: string }

    TagList:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items: { $ref: "#/components/schemas/Tag" }

    Problem:
      type: object
      description: RFC 9457 Problem Details error body.
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        current_version:
          type: integer
          description: Present on version-conflict problems.

security:
  - localToken: []
  - bearerToken: []
