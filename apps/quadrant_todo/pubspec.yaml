name: quadrant_todo
description: Quadrant Todo — Eisenhower-matrix task manager for iOS and Linux.
version: 1.7.0
publish_to: none

# Not a pub-workspace member: this package requires the Flutter SDK, which
# the pure-Dart workspace (and CI for it) must not depend on. Run
# `flutter pub get` here with a local Flutter installation.

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  quadrant_api_client:
    path: ../../packages/quadrant_api_client
  quadrant_backend_host:
    path: ../../packages/quadrant_backend_host

# Every pure-Dart package in the app's transitive graph is publish_to:none,
# so each must resolve from its local path (none exist on pub.dev). Keep this
# list complete or `flutter pub get` fails version solving.
dependency_overrides:
  quadrant_api_client:
    path: ../../packages/quadrant_api_client
  quadrant_api_server:
    path: ../../packages/quadrant_api_server
  quadrant_application:
    path: ../../packages/quadrant_application
  quadrant_domain:
    path: ../../packages/quadrant_domain
  quadrant_store:
    path: ../../packages/quadrant_store
  quadrant_temporal:
    path: ../../packages/quadrant_temporal
  quadrant_usage:
    path: ../../packages/quadrant_usage
  quadrant_query:
    path: ../../packages/quadrant_query

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
