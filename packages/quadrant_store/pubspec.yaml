name: quadrant_store
description: SQLite persistence (database, migrations, repositories) for Quadrant Todo.
version: 1.6.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  quadrant_application: ^1.0.0
  quadrant_usage: ^1.4.0
  quadrant_domain: ^1.0.0
  # 2.x loads the system libsqlite3; 3.x pulls a prebuilt native asset at
  # build time, which is unavailable in restricted environments.
  sqlite3: ^2.4.0

dev_dependencies:
  test: ^1.25.0
